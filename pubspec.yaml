name: comosano
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.2.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9

  # Estado
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^4.0.2

  # HTTP y API
  dio: ^5.9.2                           # Cliente HTTP con interceptores
  http: ^1.6.0                          # HTTP simple (utilidades)

  # Variables de entorno
  flutter_dotenv: ^5.1.0               # Carga .env en todas las plataformas

  # Autenticación y almacenamiento local
  shared_preferences: ^2.5.4           # Token JWT — Web y Windows
  flutter_secure_storage: ^10.0.0      # Token JWT seguro — iOS y Android
  encrypt: ^5.0.3
  crypto: ^3.0.7

  # Imágenes y archivos adjuntos
  image_picker: ^1.1.2                 # Cámara y galería (iOS, Android, Web)
  file_picker: ^10.3.8                 # Explorador de archivos (Windows, Web)
  flutter_image_compress: ^2.4.0
  image: 4.5.4
  cached_network_image: ^3.4.1         # Caché de imágenes remotas
  path_provider: ^2.1.5
  open_filex: ^4.7.0

  # Notificaciones
  flutter_local_notifications: ^18.0.0 # Notificaciones locales (Windows + fallback)

  # UI y experiencia
  flutter_svg: ^2.0.10+1              # Íconos SVG
  timeago: ^3.6.1                      # "hace 5 minutos"
  intl: ^0.19.0                        # Fechas y formato en español
  shimmer: ^3.0.0                      # Skeleton loaders mientras carga
  carousel_slider: ^5.1.1
  smooth_page_indicator: ^2.0.1
  buttons_tabbar: ^1.3.15

  # Utilidades
  uuid: ^4.5.1                         # Generación de UUIDs
  connectivity_plus: ^7.0.0           # Detectar conexión a internet
  url_launcher: ^6.3.2                 # Abrir URLs externas
  url_strategy: ^0.3.0
  app_links: ^6.4.0
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0

  # PDF
  pdf: ^3.10.8
  printing: ^5.14.2
  material_symbols_icons: ^4.2928.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3           # Generación de código Riverpod
  riverpod_lint: ^3.0.3
  freezed: ^3.2.5
  build_runner: any
  build_test: any
  build_web_compilers: any
  json_serializable: ^6.13.0
# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - .env                             # Variables de entorno (flutter_dotenv)
    - assets/
    - assets/images/
    - assets/icon/
    - assets/data/
    - assets/aviso_privacidad.pdf
    - assets/terminos_condiciones.pdf

